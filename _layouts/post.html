---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  <p class="post-meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.categories.size > 0 %}
    &middot;
    {% for cat in page.categories %}{{ cat }}{% unless forloop.last %}, {% endunless %}{% endfor %}
    {% endif %}
  </p>

  {% if page.featured_image %}
  <img src="{{ site.baseurl }}/{{ page.featured_image }}" alt="{{ page.title }}">
  {% endif %}

  {{ content }}
</article>
