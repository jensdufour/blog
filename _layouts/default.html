<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    :root {
      --text: #1a1a1a;
      --bg: #fff;
      --accent: #0366d6;
      --muted: #586069;
      --border: #e1e4e8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #c9d1d9;
        --bg: #0d1117;
        --accent: #58a6ff;
        --muted: #8b949e;
        --border: #30363d;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      max-width: 48rem;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header a {
      color: var(--text);
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 600;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1,
    h2,
    h3,
    h4 {
      margin: 1.5rem 0 0.5rem;
    }

    p,
    ul,
    ol,
    pre,
    blockquote {
      margin-bottom: 1rem;
    }

    pre {
      background: #f6f8fa;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
    }

    @media (prefers-color-scheme: dark) {
      pre {
        background: #161b22;
      }
    }

    code {
      font-size: 0.9em;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .post-meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .post-list {
      list-style: none;
    }

    .post-list li {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }

    .post-list li:last-child {
      border-bottom: none;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <header>
    <a href="{{ site.baseurl }}/">{{ site.title }}</a>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    &copy; {{ 'now' | date: "%Y" }} {{ site.title }}
  </footer>
</body>

</html>
