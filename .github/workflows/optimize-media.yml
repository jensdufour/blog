name: Optimize media

on:
  push:
    branches: [main]
    paths:
      - "media/**"
      - "theme/assets/**"

  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Rename media to follow naming convention
        run: python scripts/rename_media.py

      - name: Optimize images to WebP
        run: python scripts/optimize_media.py

      - name: Commit renamed and optimized media
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/ media/ theme/
          git diff --cached --quiet || git commit -m "chore: rename and optimize media"
          git push
