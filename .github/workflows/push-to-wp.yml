name: Sync posts to WordPress

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  sync-to-wp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Rename media to follow naming convention
        run: python scripts/rename_media.py

      - name: Optimize images to WebP
        run: python scripts/optimize_media.py

      - name: Commit renamed and optimized media
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/ media/
          git diff --cached --quiet || git commit -m "chore: rename and optimize media"
          git push

      - name: Sync to WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python scripts/sync_to_wp.py

      - name: Commit updated mapping files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .post-mapping.json .page-mapping.json
          git diff --cached --quiet || git commit -m "chore: update mapping after sync to WP"
          git push
