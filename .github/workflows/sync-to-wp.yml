name: Sync to WordPress

on:
  push:
    branches: [main]
    paths:
      - "_posts/**"
      - "_pages/**"
      - "scripts/sync_to_wp.py"

  workflow_run:
    workflows: ["Optimize media"]
    types: [completed]
    branches: [main]

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync to WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python scripts/sync_to_wp.py

      - name: Commit updated mapping files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .post-mapping.json .page-mapping.json
          git diff --cached --quiet || git commit -m "chore: update mapping after sync to WP"
          git push
